<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Car Viewer</title>


  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    model-viewer {
      width: 90%;
      height: 90%;
      background: #000;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <model-viewer 
    src="car.glb"
    alt="3D Car"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    exposure="1"
    ar
  >
  </model-viewer>

</body>
</html>
