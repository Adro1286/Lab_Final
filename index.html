<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Garage</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: sans-serif;
    }

    body::before, body::after {
      content: "";
      position: absolute;
      width: 200%;
      height: 2px;
      background: linear-gradient(90deg, transparent, white, transparent);
      opacity: 0.3;
      animation: move 6s linear infinite;
    }

    body::after {
      top: 70%;
      animation-delay: 3s;
    }

    @keyframes move {
      0% { transform: translateX(-50%); }
      100% { transform: translateX(50%); }
    }

    model-viewer {
      width: 90%;
      height: 90%;
      border-radius: 16px;
      background: rgba(0,0,0,0.9);
      box-shadow: 0 0 60px rgba(255,255,255,0.1);
    }

    .title {
      position: absolute;
      top: 20px;
      color: white;
      font-size: 1.5rem;
      letter-spacing: 2px;
      opacity: 0.8;
    }

    .btn {
      position: absolute;
      bottom: 30px;
      padding: 12px 18px;
      background: rgba(255,255,255,0.1);
      border: 1px solid white;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="title">Luxury Garage • Interactive Viewer</div>

<button class="btn" onclick="toggleView()">Switch View</button>

<model-viewer
  id="car"
  src="toyota_gt-86.glb"
  alt="3D Car"
  camera-controls
  exposure="1.2"
  shadow-intensity="1.5"
  shadow-softness="1"
  environment-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
  skybox-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
  tone-mapping="aces"
>
</model-viewer>

<script>
  const viewer = document.getElementById("car");

  let insideView = true;

  const driverView = {
    orbit: "0deg 90deg 1.2m",
    target: "0m 1m 0m"
  };

  const outsideView = {
    orbit: "45deg 75deg 3m",
    target: "0m 0.5m 0m"
  };

  function toggleView() {
    insideView = !insideView;

    if (insideView) {
      viewer.cameraOrbit = driverView.orbit;
      viewer.cameraTarget = driverView.target;
    } else {
      viewer.cameraOrbit = outsideView.orbit;
      viewer.cameraTarget = outsideView.target;
    }
  }

  // set default view
  viewer.cameraOrbit = driverView.orbit;
  viewer.cameraTarget = driverView.target;
</script>

</body>
</html>
