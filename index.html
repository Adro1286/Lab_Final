<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Car Sandbox</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; }
  </style>
</head>
<body>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

let scene, camera, renderer, car;

let keys = {};
let speed = 0;
let maxSpeed = 0.2;
let acceleration = 0.005;
let friction = 0.02;
let turnSpeed = 0.03;

init();
animate();

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x888888);

  camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // LIGHT
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light);

  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  // GROUND (big gray block)
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x777777 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  // LOAD CAR
  const loader = new GLTFLoader();
  loader.load("toyota_gt-86.glb", (gltf) => {
    car = gltf.scene;
    car.scale.set(1, 1, 1);
    car.position.set(0, 0, 0);
    scene.add(car);
  });

  // CAMERA POSITION
  camera.position.set(0, 5, 10);

  // INPUT
  window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
  window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

  window.addEventListener("resize", onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  if (car) updateCar();

  renderer.render(scene, camera);
}

function updateCar() {
  // forward / backward
  if (keys["w"]) {
    speed = Math.min(speed + acceleration, maxSpeed);
  } else if (keys["s"]) {
    speed = Math.max(speed - acceleration, -maxSpeed);
  } else {
    // friction slowdown
    if (speed > 0) speed -= friction;
    if (speed < 0) speed += friction;
    if (Math.abs(speed) < 0.001) speed = 0;
  }

  // turning (only if moving)
  if (keys["a"]) car.rotation.y += turnSpeed * (speed !== 0 ? 1 : 0.5);
  if (keys["d"]) car.rotation.y -= turnSpeed * (speed !== 0 ? 1 : 0.5);

  // move forward in direction it's facing
  car.position.x -= Math.sin(car.rotation.y) * speed;
  car.position.z -= Math.cos(car.rotation.y) * speed;

  // camera follow (simple chase cam)
  camera.position.x = car.position.x + Math.sin(car.rotation.y) * 8;
  camera.position.z = car.position.z + Math.cos(car.rotation.y) * 8;
  camera.position.y = 4;

  camera.lookAt(car.position);
}
</script>

</body>
</html>
