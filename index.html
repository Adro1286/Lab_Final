<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Garage</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      overflow: hidden;
      font-family: sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: black;
    }

    /* UI layer ABOVE everything */
    .ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    .btn {
      padding: 12px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid white;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .label {
      color: white;
      margin-bottom: 10px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="ui">
  <div class="label" id="mode">Exterior View</div>
  <button class="btn" onclick="toggleView()">Switch View</button>
</div>

<model-viewer
  id="car"
  src="toyota_gt-86.glb"
  camera-controls
  exposure="1.2"
  shadow-intensity="1.5"
  shadow-softness="1"
  environment-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
  skybox-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
  tone-mapping="aces"
>
</model-viewer>

<script>
  const viewer = document.getElementById("car");
  const label = document.getElementById("mode");

  let inside = false;

  // ✅ MUCH better tuned presets
  const interior = {
    orbit: "0deg 85deg 0.9m",
    target: "0m 1.05m 0.6m"
  };

  const exterior = {
    orbit: "0deg 75deg 3.2m",
    target: "0m 0.5m 0m"
  };

  function apply(view) {
    viewer.cameraOrbit = view.orbit;
    viewer.cameraTarget = view.target;
  }

  function toggleView() {
    inside = !inside;

    if (inside) {
      apply(interior);
      label.innerText = "Interior (Driver View)";
    } else {
      apply(exterior);
      label.innerText = "Exterior View";
    }
  }

  // default
  apply(exterior);
</script>

</body>
</html>
